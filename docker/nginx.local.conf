map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $cookie_shadowcheck_grafana_embed $grafana_embed_allowed {
    default 0;
    "1" 1;
}

server {
    listen 80;
    server_name _;

    # Use systemd-resolved via Docker/podman DNS. Works universally across platforms.
    # For Docker: 127.0.0.11 (built-in)
    # For Podman: Uses 10.89.1.1 (podman network DNS)
    # This works on both local and EC2 deployments
    resolver 10.89.1.1 127.0.0.11 valid=5s;
    set $backend http://api:3001;
    set $grafana http://grafana:3002;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
    }

    location /ws/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location ^~ /grafana/public/ {
        if ($request_uri ~ "^/grafana/?$") {
            return 302 /grafana/playlists/play/shadowcheck-rotation?kiosk;
        }

        proxy_pass $grafana;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /grafana;
        proxy_hide_header X-Frame-Options;
    }

    location ^~ /grafana/ {
        if ($request_uri ~ "^/grafana/?$") {
            return 302 /grafana/playlists/play/shadowcheck-rotation?kiosk;
        }

        proxy_pass $grafana;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /grafana;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_hide_header X-Frame-Options;
    }

    location = /login {
        proxy_pass $grafana/login$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /grafana;
        proxy_hide_header X-Frame-Options;
    }

    location ^~ /public/build/ {
        proxy_pass $grafana/public/build/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /grafana;
        proxy_hide_header X-Frame-Options;
    }

    location /agency-offices {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
    }

    location /federal-courthouses {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
    }

    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
