# Shared PostgreSQL + PostGIS infrastructure for ShadowCheck
# This should be started first before application containers

services:
  postgres:
    image: shadowcheck/postgres:18-postgis
    container_name: shadowcheck_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-shadowcheck_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-shadowcheck_db}
      PGDATA: /var/lib/postgresql/data
      # Performance tuning
      POSTGRES_SHARED_BUFFERS: ${POSTGRES_SHARED_BUFFERS:-256MB}
      POSTGRES_EFFECTIVE_CACHE_SIZE: ${POSTGRES_EFFECTIVE_CACHE_SIZE:-1GB}
      POSTGRES_MAX_CONNECTIONS: ${POSTGRES_MAX_CONNECTIONS:-100}
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - /var/lib/postgresql:/var/lib/postgresql
      # NOTE: SQL migrations are handled by scs_rebuild.sh via docker cp to allow writable /sql directory
      - ${REPO_ROOT:-/home/ssm-user/shadowcheck}/backups:/backups
    network_mode: host
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DB_USER:-shadowcheck_user} -d ${DB_NAME:-shadowcheck_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    shm_size: 256mb
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: shadowcheck_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_LISTEN_ADDRESS: 0.0.0.0
      PGADMIN_LISTEN_PORT: ${PGADMIN_PORT:-5050}
      PGADMIN_ENABLE_TLS: ${PGADMIN_ENABLE_TLS:-True}
      PGADMIN_SERVER_CERT: ${PGADMIN_SERVER_CERT:-/certs/server.cert}
      PGADMIN_SERVER_KEY: ${PGADMIN_SERVER_KEY:-/certs/server.key}
      PGADMIN_DEFAULT_SERVER_HOST: 127.0.0.1
    volumes:
      - /var/lib/pgadmin:/var/lib/pgadmin
      # NOTE: This file must be pre-created by scripts/setup-ec2.sh before compose up
      - ${REPO_ROOT:-/home/ssm-user/shadowcheck}/docker/infrastructure/pgadmin-config/servers.json:/pgadmin4/servers.json:ro
      - /var/lib/postgresql/certs/web:/certs:ro
    network_mode: host
    healthcheck:
      test: ["CMD", "python3", "/pgadmin4/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Redis for caching (if needed)
  redis:
    image: redis:7-alpine
    container_name: shadowcheck_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - /var/lib/redis:/data
    network_mode: host
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
