apiVersion: 1
datasources:
  - name: ShadowCheck-Postgres
    uid: shadowcheck-postgres
    type: postgres
    url: 127.0.0.1:5432
    database: shadowcheck_db
    user: grafana_reader
    secureJsonData:
      password: "${GRAFANA_READER_PASSWORD}"
    jsonData:
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1800
      timescaledb: false
      searchPath: app
    isDefault: true
