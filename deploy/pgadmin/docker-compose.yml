# Local pgAdmin with AWS Secrets Manager integration
# Connects to remote EC2 PostgreSQL instance

services:
  pgadmin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shadowcheck_pgadmin_local
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@shadowcheck.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_LISTEN_PORT: 5050
      AWS_DEFAULT_REGION: us-east-1
      # Use SSO profile credentials
      AWS_PROFILE: shadowcheck-sso
    ports:
      - "5050:5050"
    volumes:
      # Mount AWS credentials from your home directory
      - ~/.aws:/var/lib/pgadmin/.aws:ro
      # Persistent pgAdmin config
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - pgadmin_net

volumes:
  pgadmin_data:
    driver: local

networks:
  pgadmin_net:
    driver: bridge
